<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glücksrad</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }

  h1 {
    font-size: 2.5rem;
    margin-bottom: 30px;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    letter-spacing: 2px;
  }

  .wheel-container {
    position: relative;
    width: min(90vw, 500px);
    height: min(90vw, 500px);
    margin-bottom: 30px;
  }

  .pointer {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 40px solid #ffd700;
    z-index: 10;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
  }

  .wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 8px solid #ffd700;
    box-shadow:
      0 0 40px rgba(255, 215, 0, 0.4),
      inset 0 0 20px rgba(0,0,0,0.3);
    transition: transform 5s cubic-bezier(0.17, 0.67, 0.21, 1);
    position: relative;
    overflow: hidden;
  }

  .center-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    background: radial-gradient(circle, #ffd700, #b8860b);
    border-radius: 50%;
    border: 4px solid #fff;
    z-index: 5;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
  }

  button {
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: #1a1a2e;
    border: none;
    padding: 15px 50px;
    font-size: 1.3rem;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 215, 0, 0.6);
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .result {
    margin-top: 25px;
    font-size: 1.5rem;
    min-height: 2rem;
    text-align: center;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
  }

  .result.show {
    animation: pop 0.5s ease;
  }

  @keyframes pop {
    0% { transform: scale(0.8); opacity: 0; }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
  <h1>🎰 Glücksrad 🎰</h1>

  <div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheel" class="wheel" width="500" height="500"></canvas>
    <div class="center-circle"></div>
  </div>

  <button id="spinBtn">Drehen</button>
  <div id="result" class="result"></div>

<script>
  // Anordnung: Hauptgewinn 1×, 2. Preis 4×, 3. Preis 7× — verteilt um das Rad
  const segments = [
    '3. Preis', '2. Preis', '3. Preis', '3. Preis',
    '2. Preis', '3. Preis', 'Hauptgewinn', '3. Preis',
    '2. Preis', '3. Preis', '3. Preis', '2. Preis'
  ];

  const colorMap = {
    'Hauptgewinn': '#ffd700',
    '2. Preis':    '#3498db',
    '3. Preis':    '#2ecc71'
  };
  const colors = segments.map(s => colorMap[s]);

  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const spinBtn = document.getElementById('spinBtn');
  const resultEl = document.getElementById('result');

  const numSegments = segments.length;
  const arc = (2 * Math.PI) / numSegments;
  const radius = canvas.width / 2;

  function drawWheel() {
    for (let i = 0; i < numSegments; i++) {
      const angle = i * arc - Math.PI / 2;

      ctx.beginPath();
      ctx.fillStyle = colors[i];
      ctx.moveTo(radius, radius);
      ctx.arc(radius, radius, radius - 4, angle, angle + arc);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.save();
      ctx.translate(radius, radius);
      ctx.rotate(angle + arc / 2);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 20px Segoe UI, sans-serif';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 4;
      ctx.fillText(segments[i], radius - 25, 8);
      ctx.restore();
    }
  }

  drawWheel();

  let currentRotation = 0;
  let spinning = false;

  function spin() {
    if (spinning) return;
    spinning = true;
    spinBtn.disabled = true;
    resultEl.textContent = '';
    resultEl.classList.remove('show');

    // Cryptographically random selection if available, else Math.random
    let rand;
    if (window.crypto && window.crypto.getRandomValues) {
      const buf = new Uint32Array(1);
      window.crypto.getRandomValues(buf);
      rand = buf[0] / (0xFFFFFFFF + 1);
    } else {
      rand = Math.random();
    }

    const winningIndex = Math.floor(rand * numSegments);

    // Random extra rotations between 5 and 9 full turns
    const extraTurns = 5 + Math.floor(Math.random() * 5);
    const segmentAngleDeg = 360 / numSegments;
    // Pointer is at top. Segment i center is at angle (i * arc + arc/2) from -PI/2.
    // We want the chosen segment center to land under the pointer (top, 0 deg in our frame).
    // Add small random offset within the segment so it doesn't always stop dead center.
    const offsetWithin = (Math.random() - 0.5) * (segmentAngleDeg * 0.7);
    const targetAngle = 360 - (winningIndex * segmentAngleDeg + segmentAngleDeg / 2) + offsetWithin;

    currentRotation += extraTurns * 360 + (targetAngle - (currentRotation % 360));
    canvas.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {
      resultEl.textContent = `🎉 ${segments[winningIndex]} 🎉`;
      resultEl.classList.add('show');
      spinning = false;
      spinBtn.disabled = false;
    }, 5100);
  }

  spinBtn.addEventListener('click', spin);
</script>
</body>
</html>
