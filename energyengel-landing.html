<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EnergyEngel | Dein unabhängiger Energiemakler in Leipzig</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green-dark:  #004312;
            --green-mid:   #1e7b1f;
            --green-main:  #44a125;
            --green-light: #d4edbb;
        }

        /* No scrolling — single fixed screen */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            font-family: 'Inter', sans-serif;
        }

        /* ── Full-screen stage — pointer-events: none so buttons behind it still work ── */
        #stage {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.65s ease;
            pointer-events: none;
        }

        /* ── Content centered — angel travels at far left/right edges ── */
        #scene-content {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 70px 65px 36px;
            pointer-events: none;
            z-index: 20;
            transition: opacity 0.38s ease, transform 0.48s cubic-bezier(0.22,1,0.36,1);
        }

        #scene-step {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 12px;
            opacity: 0;
        }

        #scene-headline {
            font-size: clamp(2.6rem, 5.5vw, 5.2rem);
            font-weight: 900;
            text-align: center;
            line-height: 1.05;
            max-width: 700px;
            letter-spacing: -0.025em;
            white-space: pre-line;
        }

        #scene-sub {
            margin-top: 16px;
            font-size: clamp(1rem, 1.8vw, 1.25rem);
            font-weight: 400;
            text-align: center;
            max-width: 520px;
            line-height: 1.6;
            opacity: 0.82;
        }

        /* Speech bubble inside content */
        #scene-speech {
            margin-top: 24px;
            background: #ffffff;
            color: #1a1a1a;
            border-radius: 18px;
            padding: 14px 22px;
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.5;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 6px 28px rgba(0,0,0,0.16);
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        /* Icons */
        #scene-icons {
            display: none;
            gap: 24px;
            margin-top: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .icon-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .icon-card .icon-circle {
            width: 68px; height: 68px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            backdrop-filter: blur(4px);
        }
        .icon-card span { font-size: 0.82rem; font-weight: 600; text-align: center; }

        /* ── Product selection buttons ── */
        #product-buttons {
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 300px;
            margin-top: 18px;
            pointer-events: auto;
        }
        .product-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 14px;
            border: 2px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.10);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.18s, border-color 0.18s;
            -webkit-tap-highlight-color: transparent;
        }
        .product-btn:hover,
        .product-btn:active {
            background: rgba(255,255,255,0.20);
            border-color: rgba(255,255,255,0.45);
        }
        .product-btn .btn-icon { font-size: 1.3rem; }
        .product-btn .btn-arrow { margin-left: auto; opacity: 0.55; font-size: 1rem; }

        /* Contact form */
        #contact-form-wrap {
            display: none;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 390px;
            pointer-events: auto;
            margin-top: 20px;
        }
        #contact-form-wrap input,
        #contact-form-wrap textarea {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.12);
            color: inherit;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(6px);
        }
        #contact-form-wrap input::placeholder,
        #contact-form-wrap textarea::placeholder { opacity: 0.5; }
        #contact-form-wrap textarea { height: 90px; resize: none; }
        /* Re-enable pointer events for interactive children inside stage */
        #contact-form-wrap,
        #contact-form-wrap input,
        #contact-form-wrap textarea,
        #contact-form-wrap button { pointer-events: auto; }
        #product-buttons,
        #product-buttons .product-btn { pointer-events: auto; }

        #contact-form-wrap button {
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--green-main);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        /* Logo */
        #top-logo {
            position: fixed;
            top: 18px;
            left: 20px;
            z-index: 300;
        }
        #top-logo span {
            font-size: 1.1rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* Step counter */
        #step-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 300;
            font-size: 0.72rem;
            font-weight: 700;
            color: rgba(255,255,255,0.65);
            letter-spacing: 0.05em;
        }

        /* Progress dots — desktop */
        #progress-dots {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 200;
        }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            border: 1.5px solid rgba(255,255,255,0.5);
            transition: background 0.3s, transform 0.3s;
            cursor: pointer;
        }
        .dot.active { background: white; transform: scale(1.4); }

        /* ── Background path SVG ── */
        #path-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: visible;
        }
        #journey-full {
            transition: stroke 0.65s ease;
        }
        #journey-progress {
            transition: stroke-dashoffset 0.55s cubic-bezier(0.4,0,0.2,1), stroke 0.65s ease;
        }
        .waypoint-dot {
            transition: fill 0.65s ease, r 0.3s ease;
        }
        #active-dot {
            transition: cx 0.5s cubic-bezier(0.4,0,0.2,1),
                        cy 0.5s cubic-bezier(0.4,0,0.2,1),
                        fill 0.65s ease;
        }

        /* ── Angel — BEHIND text so it never blocks headlines ── */
        #engel-wrap {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            will-change: transform;
            z-index: 15;   /* below #scene-content (z-index:20) */
            width: 150px;
            height: 180px;
        }
                model-viewer::part(default-progress-bar) { display: none; }
        model-viewer::part(default-poster) { opacity: 0; }
        model-viewer {
            width: 150px;
            height: 180px;
            background: transparent !important;
            --poster-color: transparent;
        }

        /* ── Nav buttons — large tap targets ── */
        #nav-prev, #nav-next {
            position: fixed;
            left: 0; right: 0;
            height: 88px;
            z-index: 500;
            cursor: pointer;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: rgba(255,255,255,0.75);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        #nav-prev {
            top: 0;
            padding-top: 52px; /* below logo bar */
        }
        #nav-next {
            bottom: 0;
            padding-bottom: 20px;
        }
        #nav-prev .arrow { font-size: 1rem; }
        #nav-next .arrow { font-size: 1rem; }

        /* Subtle visual hint */
        #nav-prev::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.06), transparent);
            pointer-events: none;
        }
        #nav-next::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.06), transparent);
            pointer-events: none;
        }

        /* Hide prev on first scene, next on last */
        #nav-prev[disabled] { opacity: 0; pointer-events: none; }
        #nav-next[disabled] { opacity: 0; pointer-events: none; }

        /* ═══════════════════════════════
           MOBILE
           ═══════════════════════════════ */
        @media (max-width: 600px) {
            model-viewer { width: 70px; height: 85px; }
            #engel-wrap { width: 70px; height: 85px; }

            #scene-content {
                justify-content: center;
                padding: 60px 60px 80px;
            }

            #scene-headline {
                font-size: clamp(2.4rem, 11.5vw, 3.5rem);
                line-height: 1.02;
                letter-spacing: -0.03em;
            }
            #scene-sub {
                font-size: 0.9rem;
                margin-top: 10px;
                max-width: 280px;
            }
            #scene-step { font-size: 0.65rem; margin-bottom: 6px; }

            #scene-speech {
                margin-top: 20px;
                font-size: 0.88rem;
                padding: 12px 18px;
                max-width: 300px;
                border-radius: 14px;
            }

            #scene-icons { gap: 10px; margin-top: 14px; }
            .icon-card .icon-circle { width: 50px; height: 50px; font-size: 1.25rem; }
            .icon-card span { font-size: 0.65rem; }

            #contact-form-wrap { max-width: 100%; margin-top: 12px; gap: 8px; }
            #contact-form-wrap input { padding: 12px 14px; font-size: 0.9rem; }
            #contact-form-wrap textarea { display: none; }
            #contact-form-wrap button { padding: 13px; font-size: 0.9rem; }

            /* Nav buttons larger on mobile */
            #nav-prev, #nav-next { height: 72px; }
            #nav-prev { padding-top: 46px; }
            #nav-next { padding-bottom: 16px; }

            #progress-dots { display: none; }
            #top-logo span { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

<div id="top-logo"><span>⚡ EnergyEngel</span></div>
<div id="step-counter">1 / 11</div>
<div id="progress-dots"></div>

<!-- Full-width tap zones for navigation -->
<button id="nav-prev" aria-label="Zurück">
    <span class="arrow">▲</span>
    <span>Zurück</span>
</button>
<button id="nav-next" aria-label="Weiter">
    <span class="arrow">▼</span>
    <span>Weiter</span>
</button>

<div id="stage">
    <!-- ── Background journey path ── -->
    <svg id="path-bg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <!-- Dashed full path: 8 waypoints, playful varied curves -->
        <path id="journey-full"
            d="M88,5 C112,-3 -14,15 5,19 C12,28 80,26 88,32 C106,22 -10,50 5,45 C-4,48 96,52 88,58 C110,50 -10,68 5,70 C-2,68 104,76 86,82 C80,92 22,92 50,93"
            fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.7"
            stroke-dasharray="2 2.8" stroke-linecap="round"/>
        <!-- Solid progress path -->
        <path id="journey-progress"
            d="M88,5 C112,-3 -14,15 5,19 C12,28 80,26 88,32 C106,22 -10,50 5,45 C-4,48 96,52 88,58 C110,50 -10,68 5,70 C-2,68 104,76 86,82 C80,92 22,92 50,93"
            fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.1"
            stroke-linecap="round"/>
        <!-- Waypoint dots — 8 scenes -->
        <circle class="waypoint-dot" cx="88" cy="5"  r="1.4" fill="rgba(255,255,255,0.18)"/>
        <circle class="waypoint-dot" cx="5"  cy="19" r="1.4" fill="rgba(255,255,255,0.18)"/>
        <circle class="waypoint-dot" cx="88" cy="32" r="1.4" fill="rgba(255,255,255,0.18)"/>
        <circle class="waypoint-dot" cx="5"  cy="45" r="1.4" fill="rgba(255,255,255,0.18)"/>
        <circle class="waypoint-dot" cx="88" cy="58" r="1.4" fill="rgba(255,255,255,0.18)"/>
        <circle class="waypoint-dot" cx="5"  cy="70" r="1.4" fill="rgba(255,255,255,0.18)"/>
        <circle class="waypoint-dot" cx="86" cy="82" r="1.4" fill="rgba(255,255,255,0.18)"/>
        <circle class="waypoint-dot" cx="50" cy="93" r="1.4" fill="rgba(255,255,255,0.18)"/>
        <!-- Active dot -->
        <circle id="active-dot" cx="88" cy="5" r="2.6" fill="white" opacity="0.75"/>
    </svg>

    <div id="scene-content">
        <div id="scene-step"></div>
        <h1 id="scene-headline"></h1>
        <p id="scene-sub"></p>
        <div id="scene-icons"></div>
        <div id="scene-speech"></div>
        <div id="product-buttons">
            <a href="energyengel-pv.html" class="product-btn">
                <span class="btn-icon">☀️</span>
                <span>Photovoltaik</span>
                <span class="btn-arrow">→</span>
            </a>
            <a href="energyengel-waermepumpe.html" class="product-btn">
                <span class="btn-icon">🌡️</span>
                <span>Wärmepumpe</span>
                <span class="btn-arrow">→</span>
            </a>
            <a href="energyengel-strom-gas.html" class="product-btn">
                <span class="btn-icon">⚡</span>
                <span>Strom &amp; Gas Vergleich</span>
                <span class="btn-arrow">→</span>
            </a>
            <a href="energyengel-komplett.html" class="product-btn">
                <span class="btn-icon">🏠</span>
                <span>Komplettlösung</span>
                <span class="btn-arrow">→</span>
            </a>
        </div>
        <div id="contact-form-wrap">
            <input type="text" placeholder="Dein Name">
            <input type="email" placeholder="Deine E-Mail-Adresse">
            <input type="tel" placeholder="Telefonnummer (optional)">
            <textarea placeholder="Was beschäftigt dich? (optional)"></textarea>
            <button type="button">Jetzt kostenlos beraten lassen ⚡</button>
        </div>
    </div>
</div>

<div id="engel-wrap">
    <model-viewer
        id="engel-viewer"
        src="engel_compressed.glb"
        camera-orbit="0deg 75deg 3.8m"
        field-of-view="55deg"
        min-field-of-view="55deg"
        max-field-of-view="55deg"
        shadow-intensity="0"
        environment-image="neutral"
        exposure="1.2"
        style="background-color: transparent;"
        loading="eager"
        autoplay
    ></model-viewer>
</div>

<script>
// ── Scenes ───────────────────────────────────────────────────────
// Angel always in corners → center is always free for text
// Angel path: top (sky) → bottom (house with PV + heat pump)
// Y increases scene by scene — clear downward journey
const SCENES = [
    {   // 1 — helles Grau-Grün (Start)
        bg: 'linear-gradient(160deg, #eceae4 0%, #dfe5d4 100%)',
        txtColor: '#1a2e08', step: '',
        headline: 'Erneuerbare\nEnergie.\nOhne Stress.',
        sub: 'Ich bringe dich in die Energie von morgen — ehrlich & entspannt.',
        speech: '⚡ Erneuerbarer Strom muss nicht kompliziert sein!',
        angelX: 88, angelY: 5,
    },
    {   // 2 — weiches Hellgrün
        bg: 'linear-gradient(160deg, #dfe5d4 0%, #cddcb8 100%)',
        txtColor: '#1a2e08', step: 'Das Problem',
        headline: 'Zu\nviele\nOptionen?',
        sub: 'Solar, Wärmepumpe, Speicher, Wallbox — wo fängst du überhaupt an?',
        speech: '😵 Ich kenne das Gefühl. Deshalb bin ich hier!',
        angelX: 5, angelY: 19,
    },
    {   // 3 — mittel-helles Grün
        bg: 'linear-gradient(160deg, #cddcb8 0%, #b4cc96 100%)',
        txtColor: '#1a2e08', step: 'Das Problem',
        headline: 'Förder-\ndschungel?',
        sub: 'KfW, BAFA, Bundesländer — jeder hat andere Regeln. Wer blickt da noch durch?',
        speech: '🌿 Ich kenne jeden Förderweg — und hole alles raus, was dir zusteht.',
        angelX: 88, angelY: 32,
    },
    {   // 4 — mittleres Grün
        bg: 'linear-gradient(160deg, #b4cc96 0%, #8fb86a 100%)',
        txtColor: '#1a2e08', step: 'Das Problem',
        headline: 'Wem kannst\ndu\nvertrauen?',
        sub: 'Hersteller wollen verkaufen. Ich nicht. Ich gehöre keinem — nur dir.',
        speech: '🤝 Meine einzige Motivation: Das Beste für dich zu finden.',
        angelX: 5, angelY: 45,
    },
    {   // 5 — dunkles Grün
        bg: 'linear-gradient(160deg, #6aa040 0%, #326814 100%)',
        txtColor: '#fff', step: 'Schritt 1',
        headline: 'Du erzählst.\nIch\nhöre zu.',
        sub: 'Wir sprechen über deine Situation, deine Wünsche, dein Zuhause.',
        speech: '💬 Kein Fachkauderwelsch. Ich frage, ich höre zu — ganz einfach.',
        angelX: 88, angelY: 58,
    },
    {   // 6 — tiefes Grün
        bg: 'linear-gradient(160deg, #326814 0%, #1e5008 100%)',
        txtColor: '#fff', step: 'Schritt 2',
        headline: 'Ich vergleiche\nalles\nfür dich.',
        sub: 'Anbieter, Technologien, Preise — ich finde das beste Paket für dich.',
        speech: '🔍 Hunderte Optionen — ich filtere auf die eine, die wirklich zu dir passt.',
        angelX: 5, angelY: 70,
    },
    {   // 7 — sehr dunkles Grün — Produktauswahl
        bg: 'linear-gradient(160deg, #113c04 0%, #0a2c02 100%)',
        txtColor: '#fff', step: 'Was interessiert dich?',
        headline: 'Wähle\ndein\nThema.',
        sub: '',
        speech: '👇 Tippe auf das Thema, das zu dir passt!',
        angelX: 86, angelY: 82,
        showProducts: true,
    },
    {   // 8 — zurück zum hellen Anfang (Ziel erreicht)
        bg: 'linear-gradient(160deg, #eceae4 0%, #dfe5d4 100%)',
        txtColor: '#1a2e08', step: '',
        headline: 'Ich bin\nfür\ndich da.',
        sub: '',
        speech: '📞 Kostenlos anfragen — ich melde mich persönlich bei dir!',
        angelX: 50, angelY: 68, mascot: true,
        showContact: true,
    },
];

const ICONS = [
    { emoji: '☀️', label: 'Photovoltaik' },
    { emoji: '🌡️', label: 'Wärmepumpe' },
    { emoji: '🔋', label: 'Stromspeicher' },
    { emoji: '🚗', label: 'Wallbox' },
];

const N = SCENES.length;

// Build progress dots (desktop)
const dotsWrap = document.getElementById('progress-dots');
for (let i = 0; i < N; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.addEventListener('click', () => goToScene(i));
    dotsWrap.appendChild(d);
}

// ── Navigation ────────────────────────────────────────────────────
let activeScene = 0;
let isTransitioning = false;

function goToScene(idx, dir) {
    idx = Math.max(0, Math.min(N - 1, idx));
    if (idx === activeScene || isTransitioning || introPhase) return;
    const direction = (dir !== undefined) ? dir : (idx > activeScene ? 1 : -1);
    isTransitioning = true;
    activeScene = idx;
    showScene(idx, direction);
    setTimeout(() => { isTransitioning = false; }, 560);
}

// Buttons
function onPrev(e) { e.preventDefault(); goToScene(activeScene - 1, -1); }
function onNext(e) { e.preventDefault(); goToScene(activeScene + 1,  1); }

document.getElementById('nav-prev').addEventListener('pointerdown', onPrev);
document.getElementById('nav-next').addEventListener('pointerdown', onNext);

// Keyboard
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') goToScene(activeScene + 1,  1);
    if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  goToScene(activeScene - 1, -1);
});

// ── Swipe with follow-through ─────────────────────────────────────
let touchStartY = 0, touchStartX = 0, touchActive = false;

document.addEventListener('touchstart', e => {
    if (isTransitioning) return;
    touchStartY  = e.touches[0].clientY;
    touchStartX  = e.touches[0].clientX;
    touchActive  = true;
    // Pause CSS transition during drag
    sceneContent.style.transition = 'none';
}, { passive: true });

document.addEventListener('touchmove', e => {
    if (!touchActive || isTransitioning) return;
    const dy = touchStartY - e.touches[0].clientY;
    const dx = touchStartX - e.touches[0].clientX;
    if (Math.abs(dy) < Math.abs(dx)) return;  // horizontal — ignore
    // Drag content: follow finger, max ±90px, dampened
    const drag = -Math.sign(dy) * Math.min(Math.abs(dy) * 0.45, 90);
    sceneContent.style.transform = `translateY(${drag}px)`;
    sceneContent.style.opacity   = String(Math.max(0.4, 1 - Math.abs(dy) / 260));
}, { passive: true });

document.addEventListener('touchend', e => {
    if (!touchActive) return;
    touchActive = false;
    const dy = touchStartY - e.changedTouches[0].clientY;
    const dx = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 55) {
        // Enough swipe → trigger transition
        goToScene(activeScene + (dy > 0 ? 1 : -1), dy > 0 ? 1 : -1);
    } else {
        // Snap back
        sceneContent.style.transition = 'opacity 0.3s ease, transform 0.38s cubic-bezier(0.22,1,0.36,1)';
        sceneContent.style.transform  = 'translateY(0)';
        sceneContent.style.opacity    = '1';
    }
}, { passive: true });

// ── DOM refs ─────────────────────────────────────────────────────
// ── Journey path ─────────────────────────────────────────────────
const journeyFull     = document.getElementById('journey-full');
const journeyProgress = document.getElementById('journey-progress');
const activeDotEl     = document.getElementById('active-dot');
const waypointDots    = document.querySelectorAll('.waypoint-dot');
// Waypoint coordinates matching SCENES order
const WAYPOINTS = [
    {x:88,y:5},{x:5,y:19},{x:88,y:32},{x:5,y:45},
    {x:88,y:58},{x:5,y:70},{x:86,y:82},{x:50,y:93}
];
let pathTotalLength = 0;
let waypointLengths = []; // arc-length along path for each waypoint

// Measure path length + find exact arc-length position of each waypoint
requestAnimationFrame(() => {
    requestAnimationFrame(() => {
        pathTotalLength = journeyFull.getTotalLength();
        journeyProgress.style.strokeDasharray  = pathTotalLength;
        journeyProgress.style.strokeDashoffset = pathTotalLength; // start hidden

        // Sample path at 3000 points, find closest point to each waypoint
        const SAMPLES = 3000;
        waypointLengths = WAYPOINTS.map(wp => {
            let bestDist = Infinity;
            let bestLen  = 0;
            for (let i = 0; i <= SAMPLES; i++) {
                const len = (i / SAMPLES) * pathTotalLength;
                const pt  = journeyFull.getPointAtLength(len);
                const dx  = pt.x - wp.x;
                const dy  = pt.y - wp.y;
                const d2  = dx * dx + dy * dy;
                if (d2 < bestDist) { bestDist = d2; bestLen = len; }
            }
            return bestLen;
        });

        updateJourneyPath(0);
    });
});

function updateJourneyPath(idx) {
    if (!pathTotalLength) return;
    // Use pre-calculated arc-length so progress dot lands exactly on waypoint
    const len = waypointLengths.length > idx
        ? waypointLengths[idx]
        : pathTotalLength * idx / (N - 1);
    journeyProgress.style.strokeDashoffset = pathTotalLength - len;
    // Move glowing dot to current waypoint
    const wp = WAYPOINTS[idx];
    activeDotEl.setAttribute('cx', wp.x);
    activeDotEl.setAttribute('cy', wp.y);
    // Highlight passed waypoints
    waypointDots.forEach((dot, i) => {
        dot.setAttribute('fill', i <= idx
            ? 'rgba(255,255,255,0.85)'
            : 'rgba(255,255,255,0.25)');
        dot.setAttribute('r', i === idx ? '2' : '1.4');
    });
}

function updatePathColors(isLight) {
    const dim      = isLight ? 'rgba(0,67,18,0.07)'  : 'rgba(255,255,255,0.07)';
    const progress = isLight ? 'rgba(0,67,18,0.20)'  : 'rgba(255,255,255,0.22)';
    const dotFill  = isLight ? 'rgba(0,67,18,0.18)'  : 'rgba(255,255,255,0.18)';
    const active   = isLight ? 'rgba(0,67,18,0.55)'  : 'rgba(255,255,255,0.7)';
    journeyFull.setAttribute('stroke', dim);
    journeyProgress.setAttribute('stroke', progress);
    activeDotEl.setAttribute('fill', active);
    waypointDots.forEach(d => {
        if (d.getAttribute('r') !== '2') d.setAttribute('fill', dotFill);
    });
}

const engelWrap    = document.getElementById('engel-wrap');
const stage        = document.getElementById('stage');
const headline     = document.getElementById('scene-headline');
const sub          = document.getElementById('scene-sub');
const iconsEl      = document.getElementById('scene-icons');
const contactWrap  = document.getElementById('contact-form-wrap');
const stepEl       = document.getElementById('scene-step');
const sceneSpeech  = document.getElementById('scene-speech');
const sceneContent = document.getElementById('scene-content');
const stepCounter  = document.getElementById('step-counter');
const navPrev      = document.getElementById('nav-prev');
const navNext      = document.getElementById('nav-next');

// ── Angel ─────────────────────────────────────────────────────────
const isMobile  = () => window.innerWidth <= 600;
const engelW    = () => isMobile() ? 70  : 150;
const engelH    = () => isMobile() ? 85  : 180;
const mascotW   = () => isMobile() ? 145 : 240;
const mascotH   = () => isMobile() ? 182 : 300;
const introW    = () => Math.min(window.innerWidth  * 0.72, 380);
const introH    = () => introW() * 1.22;

let introPhase  = true;   // true while the opening animation runs
let wobbleT     = 0;
let currentW    = introW();
let currentH    = introH();
let currentX    = window.innerWidth  / 2 - currentW / 2;
let currentY    = window.innerHeight / 2 - currentH / 2;
let lerpBoost   = 0;
let prevScene   = -1;

function lerp(a, b, t) { return a + (b - a) * t; }

// ── Scene transition ──────────────────────────────────────────────
let sceneTimer = null;

// dir: +1 = forward (text slides up), -1 = backward (text slides down)
function showScene(idx, dir) {
    const outY = dir >= 0 ? '-55px' : '55px';   // current text exits
    const inY  = dir >= 0 ?  '55px' : '-55px';  // new text enters from opposite

    // Slide current text out
    sceneContent.style.transition = 'opacity 0.3s ease, transform 0.35s cubic-bezier(0.4,0,0.2,1)';
    sceneContent.style.opacity   = '0';
    sceneContent.style.transform = `translateY(${outY})`;

    stage.style.background = SCENES[idx].bg;

    if (sceneTimer) clearTimeout(sceneTimer);
    sceneTimer = setTimeout(() => {
        applyScene(SCENES[idx], idx);

        // Position entry state (below/above) — no transition
        sceneContent.style.transition = 'none';
        sceneContent.style.opacity    = '0';
        sceneContent.style.transform  = `translateY(${inY})`;

        requestAnimationFrame(() => requestAnimationFrame(() => {
            sceneContent.style.transition = 'opacity 0.42s ease, transform 0.52s cubic-bezier(0.22,1,0.36,1)';
            sceneContent.style.opacity    = '1';
            sceneContent.style.transform  = 'translateY(0)';
        }));
    }, 200);
}

function applyScene(sc, idx) {
    // Step label
    stepEl.textContent  = sc.step || '';
    stepEl.style.color  = sc.txtColor;
    stepEl.style.opacity = sc.step ? '0.65' : '0';

    // Headline
    headline.style.color   = sc.txtColor;
    headline.textContent   = sc.headline;

    // Sub text
    sub.style.color   = sc.txtColor;
    sub.textContent   = sc.sub || '';
    sub.style.display = sc.sub ? 'block' : 'none';

    // Icons (legacy — no longer used)
    iconsEl.style.display = 'none';

    // Product buttons
    const productButtons = document.getElementById('product-buttons');
    productButtons.style.display = sc.showProducts ? 'flex' : 'none';

    // Contact form
    if (sc.showContact) {
        const isLightBg = sc.txtColor !== '#fff';
        contactWrap.style.display = 'flex';
        contactWrap.querySelectorAll('input,textarea').forEach(el => {
            el.style.color       = sc.txtColor;
            el.style.borderColor = isLightBg ? 'rgba(0,67,18,0.25)' : 'rgba(255,255,255,0.25)';
            el.style.background  = isLightBg ? 'rgba(255,255,255,0.75)' : 'rgba(255,255,255,0.12)';
        });
    } else {
        contactWrap.style.display = 'none';
    }

    // Speech bubble — always visible, fades in with content
    sceneSpeech.textContent = sc.speech;

    // Journey path
    const isLight = sc.txtColor !== '#fff';
    updateJourneyPath(idx);
    updatePathColors(isLight);

    // Progress dots
    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));

    // Step counter
    stepCounter.textContent = `${idx + 1} / ${N}`;

    // Nav button states
    navPrev.disabled = idx === 0;
    navNext.disabled = idx === N - 1;

    // Logo + counter color
    document.querySelector('#top-logo span').style.color = isLight ? '#004312' : '#ffffff';
    stepCounter.style.color = isLight ? 'rgba(0,67,18,0.55)' : 'rgba(255,255,255,0.65)';
    navPrev.style.color = isLight ? 'rgba(0,67,18,0.5)' : 'rgba(255,255,255,0.7)';
    navNext.style.color = isLight ? 'rgba(0,67,18,0.5)' : 'rgba(255,255,255,0.7)';
}

// ── RAF: smooth angel movement ─────────────────────────────────────
const engelViewer = document.getElementById('engel-viewer');
function raf() {
    const sc  = SCENES[activeScene];
    const vw  = window.innerWidth;
    const vh  = window.innerHeight;
    const isMasc = !!sc.mascot && !introPhase;

    if (activeScene !== prevScene) { prevScene = activeScene; lerpBoost = 1; }
    lerpBoost *= 0.76;

    // ── Target size ──
    let tW, tH;
    if      (introPhase) { tW = introW(); tH = introH(); }
    else if (isMasc)     { tW = mascotW(); tH = mascotH(); }
    else                 { tW = engelW();  tH = engelH(); }

    const sizeSpeed = introPhase ? 0.06 : (0.06 + lerpBoost * 0.18);
    currentW = lerp(currentW, tW, sizeSpeed);
    currentH = lerp(currentH, tH, sizeSpeed);
    engelWrap.style.width    = currentW + 'px';
    engelWrap.style.height   = currentH + 'px';
    engelViewer.style.width  = currentW + 'px';
    engelViewer.style.height = currentH + 'px';

    // ── Target position ──
    let targetX, targetY;
    if (introPhase) {
        // Hover in the center of the screen
        targetX = vw / 2 - currentW / 2;
        targetY = vh / 2 - currentH / 2;
    } else {
        targetX = Math.max(4, Math.min(vw - currentW - 4, (sc.angelX / 100) * vw - currentW / 2));
        targetY = Math.max(4, Math.min(vh - currentH - 4, (sc.angelY / 100) * vh - currentH / 2));
    }

    // ── Wobble ──
    wobbleT += 0.022;
    const wobBurst = lerpBoost * (isMobile() ? 14 : 10);
    const wobAmp   = introPhase ? 7 : (isMasc ? 3 : (4 + wobBurst));
    const wobX = Math.sin(wobbleT * 1.1) * wobAmp;
    const wobY = Math.sin(wobbleT * 0.7) * wobAmp;

    const speed = introPhase ? 0.04 : (0.05 + lerpBoost * 0.32);
    currentX = lerp(currentX, targetX + wobX, speed);
    currentY = lerp(currentY, targetY + wobY, speed);

    engelWrap.style.transform = `translate(${currentX}px, ${currentY}px)`;
    engelWrap.style.opacity   = '1';

    requestAnimationFrame(raf);
}

// ── Init ──────────────────────────────────────────────────────────
stage.style.background = SCENES[0].bg;
applyScene(SCENES[0], 0);

// Hide content while angel does its opening flight
sceneContent.style.opacity    = '0';
sceneContent.style.transition = 'none';
// Disable nav during intro
navPrev.disabled = true;
navNext.disabled = true;

requestAnimationFrame(raf);

// After 1.4 s: angel flies to corner, then content fades in
setTimeout(() => {
    introPhase = false;
    lerpBoost  = 1.5;   // boost for dramatic acceleration to corner
    navPrev.disabled = true;  // still scene 0
    navNext.disabled = false;
    // Text slides in shortly after angel starts moving
    setTimeout(() => {
        sceneContent.style.transition = 'opacity 0.8s ease';
        sceneContent.style.opacity    = '1';
    }, 350);
}, 1400);
</script>
</body>
</html>
